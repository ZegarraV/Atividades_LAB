<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Automóveis — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Rajdhani:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-body">

<div class="al-sidebar" id="sidebar">
  <div class="al-sidebar-brand">
    <img th:src="@{/static/img/logo.png}" src="/static/img/logo.png" alt="AutoLoc" style="height:72px;width:auto;max-width:100%;object-fit:contain"/>
  </div>
  <nav class="al-sidebar-nav">
    <!-- Cliente -->
    <th:block th:if="${usuarioTipo == 'CLIENTE'}">
      <a th:href="@{/cliente}" class="al-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      <a th:href="@{/pedidos/novo-pedido}" class="al-nav-link"><i class="bi bi-plus-circle-fill"></i> Novo Pedido</a>
      <a th:href="@{/automoveis}" class="al-nav-link active"><i class="bi bi-car-front"></i> Automóveis</a>
      <a th:href="@{/cliente/perfil}" class="al-nav-link"><i class="bi bi-person-circle"></i> Meu Perfil</a>
    </th:block>
    <!-- Agente -->
    <th:block th:if="${usuarioTipo == 'AGENTE'}">
      <a th:href="@{/agente}" class="al-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
      <a th:href="@{/automoveis}" class="al-nav-link active"><i class="bi bi-car-front"></i> Automóveis</a>
      <a th:href="@{/automoveis/novo}" class="al-nav-link"><i class="bi bi-plus-circle-fill"></i> Cadastrar</a>
    </th:block>
  </nav>
  <div class="al-sidebar-footer">
    <div class="al-user-info">
      <div class="al-avatar"><span th:text="${#strings.substring(usuarioNome,0,1)}">U</span></div>
      <div>
        <div class="al-user-name" th:text="${usuarioNome}">Usuário</div>
        <div class="al-user-role" th:text="${usuarioTipo}">TIPO</div>
      </div>
    </div>
    <form method="post" th:action="@{/logout}" class="mt-2">
      <button type="submit" class="al-logout-btn"><i class="bi bi-box-arrow-right me-1"></i> Sair</button>
    </form>
  </div>
</div>

<div class="al-main">
  <header class="al-topbar">
    <button class="al-sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <h1 class="al-page-title">Automóveis</h1>
  </header>

  <div class="al-content">
    <div th:if="${msg}" class="alert al-alert-success alert-dismissible fade show mb-4">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${msg}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert al-alert-danger alert-dismissible fade show mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div class="al-section-header mb-4">
      <span class="al-section-title">
        <i class="bi bi-car-front me-2" style="color:var(--accent)"></i>
        Frota de Veículos
        <span style="font-size:12px; color:var(--text-muted); font-weight:400"
              th:text="|( ${#lists.size(automoveis)} veículos)|"></span>
      </span>
      <a th:if="${usuarioTipo == 'AGENTE'}" th:href="@{/automoveis/novo}"
         class="al-btn al-btn-primary al-btn-sm">
        <i class="bi bi-plus-lg"></i> Cadastrar Automóvel
      </a>
    </div>

    <div th:if="${automoveis == null or #lists.isEmpty(automoveis)}" class="al-empty">
      <i class="bi bi-car-front"></i>
      <p>Nenhum automóvel cadastrado ainda.</p>
    </div>

    <div th:if="${automoveis != null and !#lists.isEmpty(automoveis)}" class="al-card">
      <div class="table-responsive">
        <table class="al-table">
          <thead>
            <tr>
              <th>Imagem</th>
              <th>Veículo</th>
              <th>Placa</th>
              <th>Ano</th>
              <th>Proprietário</th>
              <th>Disponibilidade</th>
              <th th:if="${usuarioTipo == 'AGENTE'}">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="car : ${automoveis}">
              <!-- Imagem -->
              <td>
                <img th:if="${car.imagemUrl != null and !#strings.isEmpty(car.imagemUrl)}"
                     th:src="${car.imagemUrl}" alt="Foto do veículo"
                     class="al-car-thumb"/>
                <div th:unless="${car.imagemUrl != null and !#strings.isEmpty(car.imagemUrl)}"
                     class="al-car-thumb-placeholder">
                  <i class="bi bi-car-front-fill"></i>
                </div>
              </td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="al-stat-icon blue" style="width:36px;height:36px;font-size:16px;border-radius:8px;flex-shrink:0">
                    <i class="bi bi-car-front-fill"></i>
                  </div>
                  <div>
                    <div style="font-weight:600" th:text="${car.marca + ' ' + car.modelo}">—</div>
                    <div style="font-size:12px; color:var(--text-muted)" th:text="${car.matricula}">—</div>
                  </div>
                </div>
              </td>
              <td><span class="al-car-plate" th:text="${car.placa}">—</span></td>
              <td th:text="${car.ano}">—</td>
              <td>
                <div th:if="${car.proprietario != null}">
                  <div style="font-size:13px" th:text="${car.proprietario.tipo != null and !#strings.isEmpty(car.proprietario.tipo) ? car.proprietario.tipo : '—'}">—</div>
                  <div style="font-size:11px; color:var(--text-muted)" th:text="${car.proprietario.referenciaId}">—</div>
                </div>
                <span th:if="${car.proprietario == null}" style="color:var(--text-muted)">—</span>
              </td>
              <td>
                <span th:if="${car.disponivel}" class="al-badge disponivel">
                  <i class="bi bi-check-circle-fill"></i> Disponível
                </span>
                <span th:unless="${car.disponivel}" class="al-badge indisponivel">
                  <i class="bi bi-x-circle-fill"></i> Indisponível
                </span>
              </td>
              <td th:if="${usuarioTipo == 'AGENTE'}">
                <form th:if="${!car.disponivel}"
                      method="post" th:action="@{/automoveis/{id}/disponibilizar(id=${car.id})}">
                  <button type="submit" class="al-btn al-btn-success al-btn-sm">
                    <i class="bi bi-check2-circle"></i> Disponibilizar
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.querySelector('.al-main').classList.toggle('expanded');
  }
</script>
</body>
</html>
