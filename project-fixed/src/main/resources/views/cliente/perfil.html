<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Perfil — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Rajdhani:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-body">

<div class="al-sidebar" id="sidebar">
  <div class="al-sidebar-brand"><img th:src="@{/static/img/logo.png}" src="/static/img/logo.png" alt="AutoLoc" style="height:72px;width:auto;max-width:100%;object-fit:contain"/></div>
  <nav class="al-sidebar-nav">
    <a th:href="@{/cliente}" class="al-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a th:href="@{/pedidos/novo-pedido}" class="al-nav-link"><i class="bi bi-plus-circle-fill"></i> Novo Pedido</a>
    <a th:href="@{/automoveis}" class="al-nav-link"><i class="bi bi-car-front"></i> Automóveis</a>
    <a th:href="@{/cliente/perfil}" class="al-nav-link active"><i class="bi bi-person-circle"></i> Meu Perfil</a>
  </nav>
  <div class="al-sidebar-footer">
    <div class="al-user-info">
      <div class="al-avatar"><span th:text="${#strings.substring(usuarioNome,0,1)}">U</span></div>
      <div>
        <div class="al-user-name" th:text="${usuarioNome}">Usuário</div>
        <div class="al-user-role">Cliente</div>
      </div>
    </div>
    <form method="post" th:action="@{/logout}" class="mt-2">
      <button type="submit" class="al-logout-btn"><i class="bi bi-box-arrow-right me-1"></i> Sair</button>
    </form>
  </div>
</div>

<div class="al-main">
  <header class="al-topbar">
    <button class="al-sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <h1 class="al-page-title">Meu Perfil</h1>
  </header>

  <div class="al-content">
    <div th:if="${msg}" class="alert al-alert-success alert-dismissible fade show mb-4">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${msg}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert al-alert-danger alert-dismissible fade show mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
      <!-- Dados pessoais -->
      <div class="col-lg-5">
        <div class="al-card h-100">
          <div class="d-flex align-items-center gap-3 mb-4">
            <div class="al-avatar" style="width:60px;height:60px;font-size:24px">
              <span th:text="${#strings.substring(cliente.nome,0,1)}">U</span>
            </div>
            <div>
              <div style="font-size:18px;font-weight:700" th:text="${cliente.nome}">Nome</div>
              <div style="font-size:13px;color:var(--text-muted)" th:text="${cliente.login}">@login</div>
            </div>
          </div>

          <div class="d-flex flex-column gap-3">
            <div>
              <div class="al-label">CPF</div>
              <div th:text="${cliente.cpf != null and !#strings.isEmpty(cliente.cpf) ? cliente.cpf : '—'}">—</div>
            </div>
            <div>
              <div class="al-label">RG</div>
              <div th:text="${cliente.rg != null and !#strings.isEmpty(cliente.rg) ? cliente.rg : '—'}">—</div>
            </div>
            <div>
              <div class="al-label">Profissão</div>
              <div th:text="${cliente.profissao != null and !#strings.isEmpty(cliente.profissao) ? cliente.profissao : '—'}">—</div>
            </div>
            <div>
              <div class="al-label">Endereço</div>
              <div th:text="${cliente.endereco != null and !#strings.isEmpty(cliente.endereco) ? cliente.endereco : '—'}">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Rendimentos -->
      <div class="col-lg-7">
        <div class="al-card h-100">
          <div class="al-section-header mb-3">
            <span class="al-section-title">
              <i class="bi bi-cash-coin me-2" style="color:var(--accent)"></i>
              Rendimentos
              <span style="font-size:12px; color:var(--text-muted); font-weight:400">
                (<span th:text="${totalRendimentos}">0</span>/3)
              </span>
            </span>
          </div>

          <!-- Adicionar rendimento -->
          <div th:if="${totalRendimentos < 3}"
               class="mb-4 p-3" style="background:rgba(59,130,246,.07); border-radius:8px; border:1px solid rgba(59,130,246,.15)">
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px">
              <i class="bi bi-plus-circle me-1"></i> Adicionar novo rendimento
            </p>
            <form method="post" th:action="@{/cliente/rendimentos}">
              <div class="row g-2">
                <div class="col-7">
                  <input name="descricao" type="text" class="al-input" placeholder="Descrição (ex: Salário)" required/>
                </div>
                <div class="col-3">
                  <input name="valor" type="number" step="0.01" min="0" class="al-input" placeholder="R$ 0,00" required/>
                </div>
                <div class="col-2">
                  <button type="submit" class="al-btn al-btn-primary w-100" style="padding:11px 0">
                    <i class="bi bi-plus-lg"></i>
                  </button>
                </div>
              </div>
            </form>
          </div>

          <!-- Lista de rendimentos -->
          <div th:if="${#lists.isEmpty(rendimentos)}" class="al-empty" style="padding:30px 0">
            <i class="bi bi-wallet2" style="font-size:32px"></i>
            <p style="font-size:13px">Nenhum rendimento cadastrado ainda.</p>
          </div>

          <div th:each="r : ${rendimentos}"
               class="d-flex align-items-center justify-content-between p-3 mb-2"
               style="background:rgba(255,255,255,.04); border-radius:8px; border:1px solid var(--border)">
            <div class="d-flex align-items-center gap-3">
              <div class="al-stat-icon green" style="width:36px;height:36px;font-size:16px;border-radius:8px">
                <i class="bi bi-currency-dollar"></i>
              </div>
              <div>
                <div style="font-weight:600; font-size:14px" th:text="${r.descricao}">Descrição</div>
                <div style="font-size:13px; color:var(--success); font-weight:600"
                     th:text="${'R$ ' + #numbers.formatDecimal(r.valor,1,'POINT',2,'COMMA')}">R$ 0,00</div>
              </div>
            </div>
            <form method="post" th:action="@{/cliente/rendimentos/{id}/remover(id=${r.id})}">
              <button type="submit" class="al-btn al-btn-danger al-btn-sm"
                      onclick="return confirm('Remover este rendimento?')">
                <i class="bi bi-trash3"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.querySelector('.al-main').classList.toggle('expanded');
  }
</script>
</body>
</html>
