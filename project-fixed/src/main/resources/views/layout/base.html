<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${titulo != null ? titulo + ' — AutoLoc' : 'AutoLoc'}">AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Rajdhani:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
  <th:block th:replace="${headExtra}"></th:block>
</head>
<body class="al-body">

<!-- Sidebar -->
<div class="al-sidebar" id="sidebar">
  <div class="al-sidebar-brand">
    <img th:src="@{/static/img/logo.png}" src="/static/img/logo.png" alt="AutoLoc" style="height:72px;width:auto;max-width:100%;object-fit:contain"/>
  </div>

  <nav class="al-sidebar-nav">
    <!-- Menu Cliente -->
    <th:block th:if="${session['usuarioTipo'] == 'CLIENTE'}">
      <a th:href="@{/cliente}" class="al-nav-link" th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>
      <a th:href="@{/pedidos/novo-pedido}" class="al-nav-link" th:classappend="${activeMenu == 'novo-pedido' ? ' active' : ''}">
        <i class="bi bi-plus-circle-fill"></i> Novo Pedido
      </a>
      <a th:href="@{/automoveis}" class="al-nav-link" th:classappend="${activeMenu == 'automoveis' ? ' active' : ''}">
        <i class="bi bi-car-front"></i> Automóveis
      </a>
      <a th:href="@{/cliente/perfil}" class="al-nav-link" th:classappend="${activeMenu == 'perfil' ? ' active' : ''}">
        <i class="bi bi-person-circle"></i> Meu Perfil
      </a>
    </th:block>

    <!-- Menu Agente -->
    <th:block th:if="${session['usuarioTipo'] == 'AGENTE'}">
      <a th:href="@{/agente}" class="al-nav-link" th:classappend="${activeMenu == 'dashboard' ? ' active' : ''}">
        <i class="bi bi-grid-1x2-fill"></i> Dashboard
      </a>
      <a th:href="@{/automoveis}" class="al-nav-link" th:classappend="${activeMenu == 'automoveis' ? ' active' : ''}">
        <i class="bi bi-car-front"></i> Automóveis
      </a>
      <a th:href="@{/automoveis/novo}" class="al-nav-link" th:classappend="${activeMenu == 'novo-automovel' ? ' active' : ''}">
        <i class="bi bi-plus-circle-fill"></i> Cadastrar Automóvel
      </a>
    </th:block>
  </nav>

  <div class="al-sidebar-footer">
    <div class="al-user-info">
      <div class="al-avatar"><span th:text="${#strings.substring(usuarioNome,0,1)}">U</span></div>
      <div>
        <div class="al-user-name" th:text="${usuarioNome}">Usuário</div>
        <div class="al-user-role" th:text="${session['usuarioTipo']}">TIPO</div>
      </div>
    </div>
    <form method="post" th:action="@{/logout}" class="mt-2">
      <button type="submit" class="al-logout-btn">
        <i class="bi bi-box-arrow-right me-1"></i> Sair
      </button>
    </form>
  </div>
</div>

<!-- Main content -->
<div class="al-main">
  <header class="al-topbar">
    <button class="al-sidebar-toggle" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <h1 class="al-page-title" th:text="${titulo != null ? titulo : 'Dashboard'}">Dashboard</h1>
  </header>

  <div class="al-content">
    <!-- Alertas globais -->
    <div th:if="${msg}" class="alert al-alert-success alert-dismissible fade show" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span th:text="${msg}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert al-alert-danger alert-dismissible fade show" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span th:text="${erro}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Conteúdo da página -->
    <th:block th:replace="${content}"></th:block>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.querySelector('.al-main').classList.toggle('expanded');
  }
</script>
</body>
</html>
