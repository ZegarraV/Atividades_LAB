<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novo Pedido — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Rajdhani:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-body">

<div class="al-sidebar" id="sidebar">
  <div class="al-sidebar-brand"><img th:src="@{/static/img/logo.png}" src="/static/img/logo.png" alt="AutoLoc" style="height:72px;width:auto;max-width:100%;object-fit:contain"/></div>
  <nav class="al-sidebar-nav">
    <a th:href="@{/cliente}" class="al-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a th:href="@{/pedidos/novo-pedido}" class="al-nav-link active"><i class="bi bi-plus-circle-fill"></i> Novo Pedido</a>
    <a th:href="@{/automoveis}" class="al-nav-link"><i class="bi bi-car-front"></i> Automóveis</a>
    <a th:href="@{/cliente/perfil}" class="al-nav-link"><i class="bi bi-person-circle"></i> Meu Perfil</a>
  </nav>
  <div class="al-sidebar-footer">
    <div class="al-user-info">
      <div class="al-avatar"><span th:text="${#strings.substring(usuarioNome,0,1)}">U</span></div>
      <div>
        <div class="al-user-name" th:text="${usuarioNome}">Usuário</div>
        <div class="al-user-role">Cliente</div>
      </div>
    </div>
    <form method="post" th:action="@{/logout}" class="mt-2">
      <button type="submit" class="al-logout-btn"><i class="bi bi-box-arrow-right me-1"></i> Sair</button>
    </form>
  </div>
</div>

<div class="al-main">
  <header class="al-topbar">
    <button class="al-sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <h1 class="al-page-title">Novo Pedido de Aluguel</h1>
  </header>

  <div class="al-content">
    <div th:if="${erro}" class="alert al-alert-danger alert-dismissible fade show mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${automoveis == null or #lists.isEmpty(automoveis)}" class="al-empty">
      <i class="bi bi-car-front"></i>
      <p>Nenhum automóvel disponível no momento.<br/>Tente novamente mais tarde.</p>
      <a th:href="@{/cliente}" class="al-btn al-btn-secondary mt-3">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <form th:if="${automoveis != null and !#lists.isEmpty(automoveis)}"
          method="post" th:action="@{/pedidos}" id="formPedido">

      <!-- Step 1: Escolha o automóvel -->
      <div class="al-card mb-4">
        <div class="al-section-title mb-4">
          <i class="bi bi-1-circle-fill me-2" style="color:var(--accent)"></i>
          Escolha o Automóvel
        </div>

        <div class="row g-3">
          <div class="col-sm-6 col-lg-4" th:each="car, iterStat : ${automoveis}">
            <label th:for="'car-' + ${car.id}" style="cursor:pointer; display:block">
              <input type="radio" name="automovelId" th:id="'car-' + ${car.id}"
                     th:value="${car.id}" class="car-radio"
                     style="position:absolute; opacity:0; width:1px; height:1px;"
                     th:checked="${iterStat.first}"/>
              <div class="al-car-card" th:id="'card-' + ${car.id}"
                   th:classappend="${iterStat.first} ? ' selected' : ''">
                <!-- Imagem ou placeholder -->
                <div th:if="${car.imagemUrl != null and !#strings.isEmpty(car.imagemUrl)}"
                     style="width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:8px;margin-bottom:12px;">
                  <img th:src="${car.imagemUrl}" alt="Foto" style="width:100%;height:100%;object-fit:cover;display:block;"/>
                </div>
                <div th:unless="${car.imagemUrl != null and !#strings.isEmpty(car.imagemUrl)}"
                     class="al-car-icon"><i class="bi bi-car-front-fill"></i></div>
                <div class="al-car-mark" th:text="${car.marca}">Marca</div>
                <div class="al-car-model" th:text="${car.modelo}">Modelo</div>
                <span class="al-car-plate" th:text="${car.placa}">ABC-1234</span>
                <div class="mt-2" style="font-size:12px; color:var(--text-muted)" th:text="${car.ano}">2024</div>
              </div>
            </label>
          </div>
        </div>
      </div>

      <!-- Step 2: Período e valor -->
      <div class="al-card mb-4">
        <div class="al-section-title mb-4">
          <i class="bi bi-2-circle-fill me-2" style="color:var(--accent)"></i>
          Período e Valor
        </div>
        <div class="row g-3">
          <div class="col-md-4">
            <div class="al-form-group mb-0">
              <label class="al-label" for="dataInicio"><i class="bi bi-calendar-event me-1"></i>Data de Início</label>
              <input id="dataInicio" name="dataInicio" type="date" class="al-input" required/>
            </div>
          </div>
          <div class="col-md-4">
            <div class="al-form-group mb-0">
              <label class="al-label" for="dataFim"><i class="bi bi-calendar-check me-1"></i>Data de Devolução</label>
              <input id="dataFim" name="dataFim" type="date" class="al-input" required/>
            </div>
          </div>
          <div class="col-md-4">
            <div class="al-form-group mb-0">
              <label class="al-label" for="valorDiario"><i class="bi bi-currency-dollar me-1"></i>Valor por Dia (R$)</label>
              <input id="valorDiario" name="valorDiario" type="number" step="0.01" min="1"
                     class="al-input" placeholder="150.00" required/>
            </div>
          </div>
        </div>

        <!-- Preview do valor total -->
        <div id="resumo" class="mt-4 p-3" style="background:rgba(59,130,246,.07); border-radius:8px; display:none">
          <div class="d-flex justify-content-between align-items-center">
            <span style="font-size:14px; color:var(--text-muted)">Valor total estimado:</span>
            <span id="valorTotal" style="font-size:22px; font-weight:700; color:var(--accent)">R$ 0,00</span>
          </div>
          <div id="diasInfo" style="font-size:12px; color:var(--text-muted); margin-top:4px"></div>
        </div>
      </div>

      <div class="d-flex gap-3">
        <a th:href="@{/cliente}" class="al-btn al-btn-secondary">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
        <button type="submit" class="al-btn al-btn-primary">
          <i class="bi bi-file-earmark-plus"></i> Criar Pedido em Rascunho
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.querySelector('.al-main').classList.toggle('expanded');
  }

  // Highlight selected car
  document.querySelectorAll('.car-radio').forEach(radio => {
    radio.addEventListener('change', function () {
      document.querySelectorAll('.al-car-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('card-' + this.value).classList.add('selected');
    });
  });

  // Set minimum dates and a sensible default range.
  (function initDates() {
    const hoje = new Date();
    const amanha = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() + 1);
    const depois = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() + 4);

    const toISO = (d) => d.toISOString().slice(0, 10);
    const inicio = document.getElementById('dataInicio');
    const fim = document.getElementById('dataFim');

    inicio.min = toISO(amanha);
    fim.min = toISO(amanha);

    if (!inicio.value) inicio.value = toISO(amanha);
    if (!fim.value) fim.value = toISO(depois);

    inicio.addEventListener('change', function () {
      fim.min = this.value;
      if (fim.value && fim.value < this.value) {
        fim.value = this.value;
      }
      calcularTotal();
    });
  })();

  // Live price preview
  function calcularTotal() {
    const ini  = document.getElementById('dataInicio').value;
    const fim  = document.getElementById('dataFim').value;
    const diario = parseFloat(document.getElementById('valorDiario').value) || 0;
    const resumo = document.getElementById('resumo');

    if (ini && fim && diario > 0) {
      const d1 = new Date(ini), d2 = new Date(fim);
      const dias = Math.max(0, Math.round((d2 - d1) / 86400000));
      if (dias > 0) {
        document.getElementById('valorTotal').textContent =
          'R$ ' + (dias * diario).toLocaleString('pt-BR', {minimumFractionDigits:2});
        document.getElementById('diasInfo').textContent = dias + ' dia(s) × R$ ' + diario.toFixed(2) + '/dia';
        resumo.style.display = 'block';
        return;
      }
    }
    resumo.style.display = 'none';
  }

  ['dataInicio','dataFim','valorDiario'].forEach(id =>
    document.getElementById(id).addEventListener('input', calcularTotal));
</script>
</body>
</html>
