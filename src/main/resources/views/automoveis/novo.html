<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastrar Automóvel — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-body">

<div class="al-sidebar" id="sidebar">
  <div class="al-sidebar-brand"><i class="bi bi-car-front-fill me-2"></i>AutoLoc</div>
  <nav class="al-sidebar-nav">
    <a th:href="@{/agente}" class="al-nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a th:href="@{/automoveis}" class="al-nav-link"><i class="bi bi-car-front"></i> Automóveis</a>
    <a th:href="@{/automoveis/novo}" class="al-nav-link active"><i class="bi bi-plus-circle-fill"></i> Cadastrar</a>
  </nav>
  <div class="al-sidebar-footer">
    <div class="al-user-info">
      <div class="al-avatar"><span th:text="${#strings.substring(usuarioNome,0,1)}">U</span></div>
      <div>
        <div class="al-user-name" th:text="${usuarioNome}">Usuário</div>
        <div class="al-user-role">Agente</div>
      </div>
    </div>
    <form method="post" th:action="@{/logout}" class="mt-2">
      <button type="submit" class="al-logout-btn"><i class="bi bi-box-arrow-right me-1"></i> Sair</button>
    </form>
  </div>
</div>

<div class="al-main">
  <header class="al-topbar">
    <button class="al-sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <h1 class="al-page-title">Cadastrar Automóvel</h1>
  </header>

  <div class="al-content">
    <div th:if="${erro}" class="alert al-alert-danger alert-dismissible fade show mb-4">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <div class="al-card" style="max-width:620px">
      <form method="post" th:action="@{/automoveis}">
        <div class="row g-3">
          <div class="col-6">
            <label class="al-label" for="marca">Marca</label>
            <input id="marca" name="marca" type="text" class="al-input" placeholder="Toyota" required/>
          </div>
          <div class="col-6">
            <label class="al-label" for="modelo">Modelo</label>
            <input id="modelo" name="modelo" type="text" class="al-input" placeholder="Corolla" required/>
          </div>
          <div class="col-4">
            <label class="al-label" for="ano">Ano</label>
            <input id="ano" name="ano" type="number" class="al-input" placeholder="2024" min="1950" max="2030" required/>
          </div>
          <div class="col-4">
            <label class="al-label" for="placa">Placa</label>
            <input id="placa" name="placa" type="text" class="al-input" placeholder="ABC-1234" required/>
          </div>
          <div class="col-4">
            <label class="al-label" for="matricula">Matrícula</label>
            <input id="matricula" name="matricula" type="text" class="al-input" placeholder="MAT-00001" required/>
          </div>

          <div class="col-12"><hr style="border-color:var(--border)"/></div>

          <div class="col-6">
            <label class="al-label" for="proprietarioTipo">Tipo do Proprietário</label>
            <select id="proprietarioTipo" name="proprietarioTipo" class="al-input">
              <option value="BANCO">Banco</option>
              <option value="EMPRESA">Empresa</option>
            </select>
          </div>
          <div class="col-6">
            <label class="al-label" for="proprietarioReferenciaId">Referência (ID/CNPJ)</label>
            <input id="proprietarioReferenciaId" name="proprietarioReferenciaId"
                   type="text" class="al-input" placeholder="00.000.000/0001-00"/>
          </div>

          <div class="col-12 d-flex gap-3 mt-2">
            <a th:href="@{/automoveis}" class="al-btn al-btn-secondary">
              <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <button type="submit" class="al-btn al-btn-primary">
              <i class="bi bi-save"></i> Cadastrar Automóvel
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');document.querySelector('.al-main').classList.toggle('expanded');}</script>
</body>
</html>
