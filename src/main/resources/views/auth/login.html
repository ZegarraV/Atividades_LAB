<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-auth-body">
  <div class="al-auth-bg"></div>

  <div class="al-auth-card">
    <div class="al-auth-logo">
      <i class="bi bi-car-front-fill"></i>
      <span>AutoLoc</span>
    </div>

    <h1 class="al-auth-title">Bem-vindo de volta</h1>
    <p class="al-auth-sub">Acesse sua conta para continuar</p>

    <div th:if="${msg}" class="alert al-alert-success mb-3 py-2 px-3" style="font-size:13px">
      <i class="bi bi-check-circle-fill me-1"></i>
      <span th:text="${msg}"></span>
    </div>
    <div th:if="${erro}" class="alert al-alert-danger mb-3 py-2 px-3" style="font-size:13px">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>
      <span th:text="${erro}"></span>
    </div>

    <form method="post" th:action="@{/login}">
      <div class="al-form-group">
        <label class="al-label" for="login"><i class="bi bi-person me-1"></i>Login</label>
        <input id="login" name="login" type="text" class="al-input" placeholder="Seu login" required autofocus/>
      </div>
      <div class="al-form-group">
        <label class="al-label" for="senha"><i class="bi bi-lock me-1"></i>Senha</label>
        <input id="senha" name="senha" type="password" class="al-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="al-btn al-btn-primary w-100 justify-content-center mt-1" style="padding:13px">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
    </form>

    <p class="text-center mt-4" style="font-size:14px; color:var(--text-muted)">
      Não tem conta?
      <a th:href="@{/cadastro}" class="al-auth-link">Cadastre-se grátis</a>
    </p>
  </div>
</body>
</html>
