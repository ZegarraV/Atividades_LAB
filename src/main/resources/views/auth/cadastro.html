<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro — AutoLoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/static/css/app.css}"/>
</head>
<body class="al-auth-body">
  <div class="al-auth-bg"></div>

  <div class="al-auth-card" style="width:500px; max-width:95vw">
    <div class="al-auth-logo">
      <i class="bi bi-car-front-fill"></i>
      <span>AutoLoc</span>
    </div>

    <h1 class="al-auth-title">Criar conta</h1>
    <p class="al-auth-sub">Preencha os dados para se cadastrar como Cliente</p>

    <div th:if="${erro}" class="alert al-alert-danger mb-3 py-2 px-3" style="font-size:13px">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>
      <span th:text="${erro}"></span>
    </div>

    <form method="post" th:action="@{/cadastro}">
      <div class="row g-3">
        <div class="col-12">
          <div class="al-form-group mb-0">
            <label class="al-label" for="nome">Nome completo</label>
            <input id="nome" name="nome" type="text" class="al-input" placeholder="João da Silva" required/>
          </div>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="cpf">CPF</label>
            <input id="cpf" name="cpf" type="text" class="al-input" placeholder="000.000.000-00" required/>
          </div>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="rg">RG</label>
            <input id="rg" name="rg" type="text" class="al-input" placeholder="00.000.000-0"/>
          </div>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="profissao">Profissão</label>
            <input id="profissao" name="profissao" type="text" class="al-input" placeholder="Engenheiro"/>
          </div>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="endereco">Endereço</label>
            <input id="endereco" name="endereco" type="text" class="al-input" placeholder="Rua, Nº, Cidade"/>
          </div>
        </div>
        <div class="col-12">
          <hr style="border-color:var(--border); margin:4px 0"/>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="login"><i class="bi bi-person me-1"></i>Login</label>
            <input id="login" name="login" type="text" class="al-input" placeholder="usuario123" required/>
          </div>
        </div>
        <div class="col-6">
          <div class="al-form-group mb-0">
            <label class="al-label" for="senha"><i class="bi bi-lock me-1"></i>Senha</label>
            <input id="senha" name="senha" type="password" class="al-input" placeholder="••••••••" required/>
          </div>
        </div>
        <div class="col-12 mt-2">
          <button type="submit" class="al-btn al-btn-primary w-100 justify-content-center" style="padding:13px">
            <i class="bi bi-person-plus-fill"></i> Criar conta
          </button>
        </div>
      </div>
    </form>

    <p class="text-center mt-3" style="font-size:14px; color:var(--text-muted)">
      Já tem conta? <a th:href="@{/login}" class="al-auth-link">Faça login</a>
    </p>
  </div>
</body>
</html>
